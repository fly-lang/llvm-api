name: Build & Test Windows

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

env:
  FLY_VERSION: 0.13.2

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 20
        shell: pwsh
        run: |
          Invoke-WebRequest `
            "https://github.com/llvm/llvm-project/releases/download/llvmorg-20.1.8/LLVM-20.1.8-win64.exe" `
            -OutFile "llvm-installer.exe"
          Start-Process -Wait -FilePath "llvm-installer.exe" -ArgumentList "/S"
          Add-Content $env:GITHUB_PATH "C:\Program Files\LLVM\bin"
          Add-Content $env:GITHUB_ENV "LIB=C:\Program Files\LLVM\lib;$($env:LIB)"

      - name: Alias LLVM import library to match Linux naming convention
        shell: pwsh
        run: |
          # The fly linker derives the DLL name from libLLVM-20.so automatically.
          # The only mismatch is the import library: installer ships LLVM-C.lib
          # but fly.toml declares libs = ["LLVM-20"], so create an alias.
          Copy-Item "C:\Program Files\LLVM\lib\LLVM-C.lib" `
                    "C:\Program Files\LLVM\lib\LLVM-20.lib"

      - name: Download Fly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: pwsh
        run: |
          gh release download v${{ env.FLY_VERSION }} `
            -R fly-lang/fly `
            -p "fly-${{ env.FLY_VERSION }}-win-x64.zip"
          Expand-Archive "fly-${{ env.FLY_VERSION }}-win-x64.zip" -DestinationPath "C:\fly"

      - name: Run Build & Test
        shell: pwsh
        run: |
          $env:PATH = "C:\fly\bin;C:\Program Files\LLVM\bin;$env:PATH"
          flyp test
