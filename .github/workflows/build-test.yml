name: Build & Test

on:
  workflow_call:
  push:
    paths-ignore:
      - '.github/workflows/**'
  workflow_dispatch:

env:
  FLY_VERSION: 0.13.1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install LLVM 20
        run: |
          wget https://apt.llvm.org/llvm.sh
          chmod +x llvm.sh
          sudo ./llvm.sh 20
          sudo apt-get install -y libllvm20 llvm-20-dev

      - name: Download Fly release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download v${{ env.FLY_VERSION }} \
            -R fly-lang/fly \
            -p "fly-${{ env.FLY_VERSION }}-linux-x86_64.tar.gz"
          sudo tar -xzf fly-${{ env.FLY_VERSION }}-linux-x86_64.tar.gz \
            -C /usr/local \
            --strip-components=1

      - name: Build with flyp
        run: flyp build --release

      - name: Run tests
        run: flyp test
